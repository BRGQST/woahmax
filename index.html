<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOAHMAX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #e8e0d5;
    --stone: #c9bfb0;
    --earth: #8b7355;
    --moss: #6b6b5a;
    --dark: #2c2c28;
    --cream: #f5f2ed;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Orbitron', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
    cursor: default;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    justify-content: center;
    gap: 4rem;
    padding: 2rem;
    background: var(--cream);
  }

  nav a {
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--dark);
    text-decoration: none;
    transition: color 0.2s;
  }

  nav a:hover {
    color: var(--earth);
  }

  /* CART ICON */
  .cart-icon {
    position: fixed;
    top: 2rem;
    right: 2rem;
    z-index: 101;
    color: var(--dark);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    transition: color 0.2s;
  }

  .cart-icon:hover {
    color: var(--earth);
  }

  .cart-count {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  #page-detail {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--cream);
  }

  #page-detail.active {
    animation: fadeIn 0.35s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* PRODUCTS */
  .products {
    min-height: 100vh;
    padding: 8rem 2rem 6rem;
    background: var(--cream);
  }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 3rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .product {
    aspect-ratio: 3/4;
    background: transparent;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding: 2rem;
    cursor: pointer;
    transition: transform 0.5s ease, opacity 0.4s ease;
    position: relative;
    overflow: hidden;
    user-select: text;
  }

  .product:hover {
    transform: scale(1.03);
  }

  .product.fade-out {
    opacity: 0;
    transform: scale(0.95);
    pointer-events: none;
  }

  .product.zoom-in {
    transform: scale(1.15);
    pointer-events: none;
    z-index: 10;
  }

  .product-image {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    max-width: 80%;
    max-height: 60%;
    object-fit: contain;
  }

  .product-placeholder {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--stone);
  }

  .product-name {
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    color: var(--dark);
    text-align: center;
  }

  .product[data-soldout="true"] .product-name {
    text-decoration: line-through;
    color: var(--stone);
  }

  /* PRODUCT DETAIL PAGE */
  .product-detail {
    min-height: 100vh;
    padding: 8rem 2rem 4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--cream);
  }

  .detail-image {
    max-width: 400px;
    max-height: 50vh;
    object-fit: contain;
  }

  .detail-placeholder {
    width: 300px;
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--stone);
  }

  .detail-image-container {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .detail-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.5rem;
    color: var(--dark);
    cursor: pointer;
    transition: opacity 0.2s;
    padding: 1rem;
    user-select: none;
    display: none;
  }

  .detail-arrow:hover {
    opacity: 0.6;
  }

  .detail-arrow.visible {
    display: block;
  }

  .detail-arrow-left {
    left: -9rem;
  }

  .detail-arrow-right {
    right: -9rem;
  }

  .detail-dots {
    display: flex;
    gap: 0.5rem;
    margin-top: 1.5rem;
  }

  .detail-dot {
    width: 6px;
    height: 6px;
    border-radius: 2px;
    background: var(--stone);
    cursor: pointer;
    transition: background 0.2s;
  }

  .detail-dot.active {
    background: var(--dark);
  }

  .detail-name {
    font-size: 1.3rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--dark);
    margin-top: 2rem;
    text-align: center;
  }

  .detail-price {
    font-size: 1rem;
    font-weight: 400;
    color: var(--earth);
    margin-top: 0.75rem;
  }

  .detail-soldout {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--earth);
    margin-top: 1rem;
    display: none;
  }

  .detail-soldout.visible {
    display: block;
  }

  .detail-sizes {
    display: none;
    gap: 1rem;
    margin-top: 1.25rem;
  }

  .detail-sizes.visible {
    display: flex;
  }

  .detail-size {
    padding: 0.25rem;
    border: none;
    background: transparent;
    color: var(--dark);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: color 0.2s;
  }

  .detail-size:hover {
    color: var(--earth);
  }

  .detail-size.sold-out {
    text-decoration: line-through;
    color: var(--stone);
    cursor: default;
  }

  .detail-size.sold-out:hover {
    color: var(--stone);
  }

  .adding-toast {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--earth);
    margin-top: 1rem;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .adding-toast.visible {
    opacity: 1;
  }

  .detail-back {
    position: fixed;
    top: 2rem;
    left: 2rem;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dark);
    text-decoration: none;
    cursor: pointer;
    transition: color 0.2s, opacity 0.2s;
    z-index: 102;
    opacity: 0;
    pointer-events: none;
  }

  .detail-back.visible,
  #checkout-back {
    opacity: 1;
    pointer-events: auto;
  }

  .detail-back:hover {
    color: var(--earth);
  }

  /* ABOUT */
  .about {
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 6rem 2rem;
    text-align: center;
    background: var(--cream);
  }

  .about-name {
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--dark);
    margin-bottom: 1.5rem;
  }

  .about-text {
    font-size: 1rem;
    font-weight: 400;
    line-height: 2;
    color: var(--moss);
    max-width: 500px;
  }

  /* FOOTER */
  footer {
    padding: 1.5rem 2rem;
    background: var(--cream);
    transition: opacity 0.4s ease;
  }

  footer.fade-out {
    opacity: 0;
  }

  .copyright {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--stone);
  }

  /* CHECKOUT */
  .checkout {
    min-height: 100vh;
    padding: 6rem 3rem 4rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    max-width: 1600px;
    margin: 0 auto;
  }

  .checkout-title {
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--dark);
    margin-bottom: 2rem;
  }

  .checkout-field {
    margin-bottom: 1rem;
  }

  .checkout-label {
    display: block;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--moss);
    margin-bottom: 0.4rem;
  }

  .checkout-input {
    width: 100%;
    padding: 0.7rem 0.75rem;
    border: 1px solid var(--stone);
    background: transparent;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s;
  }

  .checkout-input:focus {
    border-color: var(--dark);
  }

  .checkout-subtitle {
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--dark);
    margin: 2rem 0 1.5rem;
  }

  .checkout-payment {
    display: none;
  }

  .checkout-payment.visible {
    display: block;
  }

  .checkout-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .checkout-checkbox {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    cursor: pointer;
  }

  .checkout-checkbox input {
    width: 14px;
    height: 14px;
    accent-color: var(--dark);
    cursor: pointer;
  }

  .checkout-checkbox span {
    font-size: 0.65rem;
    letter-spacing: 0.05em;
    color: var(--moss);
  }

  .checkout-submit {
    width: 100%;
    padding: 1rem;
    margin-top: 1rem;
    border: 1px solid var(--dark);
    background: var(--dark);
    color: var(--cream);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .checkout-submit:hover {
    background: transparent;
    color: var(--dark);
  }

  .checkout-items {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .checkout-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding-bottom: 1rem;
  }

  .checkout-item-image {
    width: 110px;
    height: 110px;
    object-fit: contain;
  }

  .checkout-item-info {
    flex: 1;
  }

  .checkout-item-name {
    font-size: 0.75rem;
    letter-spacing: 0.05em;
  }

  .checkout-item-right {
    text-align: left;
  }

  .checkout-item-price {
    font-size: 0.85rem;
    color: var(--dark);
    display: block;
    margin-bottom: 0.5rem;
  }

  .checkout-item-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.35rem;
  }

  .checkout-item-label {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--moss);
    min-width: 4.5rem;
  }


  .checkout-item-qty-btn {
    width: 20px;
    height: 20px;
    border: 1px solid var(--stone);
    background: transparent;
    color: var(--dark);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s;
  }

  .checkout-item-qty-btn:hover {
    border-color: var(--dark);
  }

  .checkout-item-qty-count {
    font-size: 0.7rem;
    min-width: 1rem;
    text-align: center;
  }

  .checkout-totals {
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--dark);
  }

  .checkout-total-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    color: var(--dark);
  }

  .checkout-total-row.hidden {
    display: none;
  }

  .checkout-total-final {
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: var(--dark);
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--dark);
    margin-bottom: 0;
  }

  .checkout-empty {
    font-size: 0.75rem;
    color: var(--stone);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* RESPONSIVE */
  @media (max-width: 1000px) {
    .checkout { grid-template-columns: 1fr; padding: 5rem 2rem 3rem; gap: 3rem; }
    .checkout-summary { order: -1; }
  }

  @media (max-width: 640px) {
    nav { gap: 2rem; padding: 1.25rem; }
    .products { padding: 5rem 1rem 3rem; }
    .products-grid { gap: 1.5rem; grid-template-columns: 1fr; }
    .detail-back { left: 1rem; top: 1.25rem; }
    .cart-icon { right: 1rem; top: 1.25rem; }
    .detail-image { max-width: 90vw; }
    .detail-arrow { display: none !important; }
    .detail-name { font-size: 1.1rem; margin-top: 1.5rem; }
    .detail-price { font-size: 0.9rem; }
    .product-detail { padding: 5rem 1rem 3rem; }
    .checkout { padding: 5rem 1.5rem 3rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="#" id="nav-merch">Merch</a>
  <a href="#">Videos</a>
</nav>

<div class="cart-icon" id="cart-icon">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M6 6h15l-1.5 9h-12z"/>
    <circle cx="9" cy="20" r="1.5"/>
    <circle cx="18" cy="20" r="1.5"/>
    <path d="M6 6L5 3H2"/>
  </svg>
  <span class="cart-count" id="cart-count">0</span>
</div>

<!-- MAIN PAGE -->
<div id="page-main" class="page active">
  <section class="products">
    <div class="products-grid">
      <div class="product" data-name="KOMTEE03" data-price="$45" data-sizes="S,M,L:out,XL" data-images="images/KOMTEE03-1.png,images/KOMTEE03-2.png">
        <img class="product-image" src="images/KOMTEE03-1.png" alt="KOMTEE03">
        <h3 class="product-name">KOMTEE03</h3>
      </div>
      <div class="product" data-name="KOMHAT03" data-price="$35" data-sizes="OS" data-images="https://images.squarespace-cdn.com/content/v1/672e42f5580783678bbe62e4/e4d393e2-e9d3-4879-bb31-5073af3db34c/KOM_HAT003_FRONT+copy.png?format=1500w">
        <img class="product-image" src="https://images.squarespace-cdn.com/content/v1/672e42f5580783678bbe62e4/e4d393e2-e9d3-4879-bb31-5073af3db34c/KOM_HAT003_FRONT+copy.png?format=1500w" alt="KOMHAT03">
        <h3 class="product-name">KOMHAT03</h3>
      </div>
      <div class="product" data-name="KOMTEE02" data-price="$45" data-images="https://images.squarespace-cdn.com/content/v1/672e42f5580783678bbe62e4/197a91a4-9833-465e-8a37-6a6e6a2848e5/KOM_TEE002_FRONT.png?format=750w,https://images.squarespace-cdn.com/content/v1/672e42f5580783678bbe62e4/885c61b8-d01d-4d76-bcc5-89e1ec003682/KOM_TEE002_BACK.png?format=750w,images/KOMTEE02-3.png" data-soldout="true">
        <img class="product-image" src="https://images.squarespace-cdn.com/content/v1/672e42f5580783678bbe62e4/197a91a4-9833-465e-8a37-6a6e6a2848e5/KOM_TEE002_FRONT.png?format=750w" alt="KOMTEE02">
        <h3 class="product-name">KOMTEE02</h3>
      </div>
    </div>
  </section>

  <footer>
    <p class="copyright">&copy; 2026 WOAHMAX</p>
  </footer>
</div>

<span class="detail-back" id="detail-back">&lt; Back</span>

<!-- PRODUCT DETAIL PAGE -->
<div id="page-detail" class="page">
  <div class="product-detail">
    <div class="detail-image-container">
      <span class="detail-arrow detail-arrow-left" id="arrow-left">&lt;</span>
      <img class="detail-image" id="detail-image" src="" alt="">
      <div class="detail-placeholder" id="detail-placeholder">Image</div>
      <span class="detail-arrow detail-arrow-right" id="arrow-right">&gt;</span>
    </div>
    <div class="detail-dots" id="detail-dots"></div>
    <h2 class="detail-name" id="detail-name"></h2>
    <p class="detail-price" id="detail-price"></p>
    <span class="detail-soldout" id="detail-soldout">Sold Out</span>
    <div class="detail-sizes" id="detail-sizes"></div>
    <span class="adding-toast" id="adding-toast">Added to cart</span>
  </div>
</div>

<!-- CHECKOUT PAGE -->
<div id="page-checkout" class="page">
  <span class="detail-back" id="checkout-back">&lt; Back</span>
  <div class="checkout">
    <div class="checkout-contact">
      <h2 class="checkout-title">Contact Information</h2>
      <form id="checkout-form">
        <div class="checkout-field">
          <label class="checkout-label">EMAIL</label>
          <input type="email" class="checkout-input" id="checkout-email" required>
        </div>
        <label class="checkout-checkbox">
          <input type="checkbox" id="subscribe-checkbox">
          <span>Subscribe to updates and notifications</span>
        </label>
        <div class="checkout-row">
          <div class="checkout-field">
            <label class="checkout-label">FIRST NAME</label>
            <input type="text" class="checkout-input" required>
          </div>
          <div class="checkout-field">
            <label class="checkout-label">LAST NAME</label>
            <input type="text" class="checkout-input" required>
          </div>
        </div>
        <div class="checkout-field">
          <label class="checkout-label">ADDRESS</label>
          <input type="text" class="checkout-input" required>
        </div>
        <div class="checkout-field">
          <label class="checkout-label">CITY</label>
          <input type="text" class="checkout-input" required>
        </div>
        <div class="checkout-row">
          <div class="checkout-field">
            <label class="checkout-label">STATE</label>
            <input type="text" class="checkout-input" required>
          </div>
          <div class="checkout-field">
            <label class="checkout-label">ZIP</label>
            <input type="text" class="checkout-input" required>
          </div>
        </div>
        <div class="checkout-field">
          <label class="checkout-label">PHONE</label>
          <input type="tel" class="checkout-input">
        </div>

        <div class="checkout-payment" id="checkout-payment">
          <h3 class="checkout-subtitle">Payment</h3>
          <div class="checkout-field">
            <label class="checkout-label">CARD NUMBER</label>
            <input type="text" class="checkout-input" id="card-number" maxlength="19">
          </div>
          <div class="checkout-row">
            <div class="checkout-field">
              <label class="checkout-label">EXPIRY</label>
              <input type="text" class="checkout-input" id="card-expiry" maxlength="5">
            </div>
            <div class="checkout-field">
              <label class="checkout-label">CVC</label>
              <input type="text" class="checkout-input" id="card-cvc" maxlength="4">
            </div>
          </div>
        </div>

        <button type="submit" class="checkout-submit">Complete Order</button>
      </form>
    </div>
    <div class="checkout-summary">
      <h2 class="checkout-title">Order Summary</h2>
      <div class="checkout-items" id="checkout-items"></div>
      <div class="checkout-totals">
        <div class="checkout-total-row">
          <span>Subtotal</span>
          <span id="checkout-subtotal">$0</span>
        </div>
        <div class="checkout-total-row hidden" id="checkout-shipping-row">
          <span>Shipping</span>
          <span>Calculated at next step</span>
        </div>
        <div class="checkout-total-row">
          <span>Taxes</span>
          <span id="checkout-taxes">$0</span>
        </div>
        <div class="checkout-total-row checkout-total-final">
          <span>Total</span>
          <span id="checkout-total">$0</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var products = document.querySelectorAll('.product');
    var productArray = Array.from(products);
    var currentProductIndex = 0;
    var pageMain = document.getElementById('page-main');
    var pageDetail = document.getElementById('page-detail');
    var detailImage = document.getElementById('detail-image');
    var detailPlaceholder = document.getElementById('detail-placeholder');
    var detailDots = document.getElementById('detail-dots');
    var detailName = document.getElementById('detail-name');
    var detailPrice = document.getElementById('detail-price');
    var detailSoldout = document.getElementById('detail-soldout');
    var detailSizes = document.getElementById('detail-sizes');
    var detailBack = document.getElementById('detail-back');
    var pageCheckout = document.getElementById('page-checkout');
    var checkoutBack = document.getElementById('checkout-back');
    var checkoutItems = document.getElementById('checkout-items');
    var checkoutSubtotal = document.getElementById('checkout-subtotal');
    var checkoutShippingRow = document.getElementById('checkout-shipping-row');
    var checkoutTotal = document.getElementById('checkout-total');
    var cartIcon = document.getElementById('cart-icon');
    var arrowLeft = document.getElementById('arrow-left');
    var arrowRight = document.getElementById('arrow-right');
    var navMerch = document.getElementById('nav-merch');
    var nav = document.querySelector('nav');
    var isDetailPage = false;
    var scrollCooldown = false;
    var currentImages = [];
    var currentImageIndex = 0;
    var footer = document.querySelector('footer');
    var isTransitioning = false;
    var cartCount = document.getElementById('cart-count');
    var addingToast = document.getElementById('adding-toast');
    var cart = [];
    var toastTimeout;

    function addToCart(name, size, price, image) {
      cart.push({ name: name, size: size, price: price, image: image });
      cartCount.textContent = cart.length;

      // Show toast
      clearTimeout(toastTimeout);
      addingToast.textContent = name + ' ' + size + ' added';
      addingToast.classList.add('visible');
      toastTimeout = setTimeout(function() {
        addingToast.classList.remove('visible');
      }, 1500);
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      cartCount.textContent = cart.length;
      renderCheckout();
    }

    function removeFromCartByKey(name, size) {
      for (var i = 0; i < cart.length; i++) {
        if (cart[i].name === name && cart[i].size === size) {
          cart.splice(i, 1);
          break;
        }
      }
      cartCount.textContent = cart.length;
      renderCheckout();
    }

    function renderCheckout() {
      checkoutItems.innerHTML = '';
      var total = 0;

      if (cart.length === 0) {
        checkoutItems.innerHTML = '<span class="checkout-empty">Your cart is empty</span>';
        checkoutSubtotal.textContent = '$0';
        checkoutShippingRow.classList.add('hidden');
        checkoutTotal.textContent = '$0';
        return;
      }

      checkoutShippingRow.classList.remove('hidden');

      // Group items by name+size
      var grouped = {};
      cart.forEach(function(item) {
        var key = item.name + '|' + item.size;
        if (!grouped[key]) {
          grouped[key] = { name: item.name, size: item.size, price: item.price, image: item.image, qty: 0 };
        }
        grouped[key].qty++;
      });

      Object.keys(grouped).forEach(function(key) {
        var item = grouped[key];
        var priceNum = parseInt(item.price.replace('$', ''));
        total += priceNum * item.qty;

        var imageHtml = item.image ? '<img class="checkout-item-image" src="' + item.image + '" alt="' + item.name + '">' : '';
        var itemEl = document.createElement('div');
        itemEl.className = 'checkout-item';
        itemEl.innerHTML = imageHtml + '<div class="checkout-item-info"><div class="checkout-item-name">' + item.name + '</div>' +
          '<span class="checkout-item-price">$' + (priceNum * item.qty) + '</span></div>' +
          '<div class="checkout-item-right">' +
          '<div class="checkout-item-row"><span class="checkout-item-label">SIZE:</span><span>' + item.size + '</span></div>' +
          '<div class="checkout-item-row"><span class="checkout-item-label">QUANTITY:</span>' +
          '<button class="checkout-item-qty-btn qty-minus" data-key="' + key + '">-</button>' +
          '<span class="checkout-item-qty-count">' + item.qty + '</span>' +
          '<button class="checkout-item-qty-btn qty-plus" data-key="' + key + '" data-name="' + item.name + '" data-size="' + item.size + '" data-price="' + item.price + '" data-image="' + (item.image || '') + '">+</button>' +
          '</div></div>';
        checkoutItems.appendChild(itemEl);
      });

      checkoutSubtotal.textContent = '$' + total;
      checkoutTotal.textContent = '$' + total;

      // Add quantity handlers
      document.querySelectorAll('.qty-minus').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var key = this.getAttribute('data-key');
          var parts = key.split('|');
          removeFromCartByKey(parts[0], parts[1]);
        });
      });

      document.querySelectorAll('.qty-plus').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var name = this.getAttribute('data-name');
          var size = this.getAttribute('data-size');
          var price = this.getAttribute('data-price');
          var image = this.getAttribute('data-image');
          addToCart(name, size, price, image);
          renderCheckout();
        });
      });
    }

    function showCheckout() {
      renderCheckout();
      pageMain.classList.remove('active');
      pageDetail.classList.remove('active');
      detailBack.classList.remove('visible');
      pageCheckout.classList.add('active');
      nav.style.display = 'none';
      document.getElementById('checkout-payment').classList.remove('visible');
    }

    function updateImage(index) {
      currentImageIndex = index;
      detailImage.src = currentImages[index];
      document.querySelectorAll('.detail-dot').forEach(function(d, i) {
        d.classList.toggle('active', i === index);
      });
    }

    function showMain() {
      isDetailPage = false;
      // Reset all transition classes
      productArray.forEach(function(p) {
        p.classList.remove('fade-out', 'zoom-in');
      });
      footer.classList.remove('fade-out');
      detailBack.classList.remove('visible');
      pageMain.classList.add('active');
      pageDetail.classList.remove('active');
      pageCheckout.classList.remove('active');
      nav.style.display = 'flex';
      window.scrollTo({ top: 0 });
    }

    function showDetail(index) {
      currentProductIndex = index;
      var product = productArray[index];
      var name = product.getAttribute('data-name');
      var price = product.getAttribute('data-price');
      var images = product.getAttribute('data-images');
      var soldout = product.getAttribute('data-soldout') === 'true';
      currentImages = images ? images.split(',').filter(function(i) { return i !== ''; }) : [];
      var firstImage = currentImages.length > 0 ? currentImages[0] : '';

      detailName.textContent = name;
      detailPrice.textContent = price;
      detailSoldout.classList.toggle('visible', soldout);

      // Build size buttons
      var sizes = product.getAttribute('data-sizes');
      detailSizes.innerHTML = '';
      if (!soldout && sizes) {
        sizes.split(',').forEach(function(sizeData) {
          var parts = sizeData.split(':');
          var size = parts[0];
          var isSizeOut = parts[1] === 'out';
          var btn = document.createElement('button');
          btn.className = 'detail-size' + (isSizeOut ? ' sold-out' : '');
          btn.textContent = size;
          if (!isSizeOut) {
            btn.addEventListener('click', function() {
              addToCart(name, size, price, firstImage);
            });
          }
          detailSizes.appendChild(btn);
        });
        detailSizes.classList.add('visible');
      } else {
        detailSizes.classList.remove('visible');
      }
      currentImageIndex = 0;
      detailDots.innerHTML = '';

      if (currentImages.length > 0) {
        detailImage.src = currentImages[0];
        detailImage.alt = name;
        detailImage.style.display = 'block';
        detailPlaceholder.style.display = 'none';

        // Show arrows if multiple images
        if (currentImages.length > 1) {
          arrowLeft.classList.add('visible');
          arrowRight.classList.add('visible');
        } else {
          arrowLeft.classList.remove('visible');
          arrowRight.classList.remove('visible');
        }

        currentImages.forEach(function(img, idx) {
          var dot = document.createElement('span');
          dot.className = 'detail-dot' + (idx === 0 ? ' active' : '');
          dot.addEventListener('click', function() {
            updateImage(idx);
          });
          detailDots.appendChild(dot);
        });
      } else {
        detailImage.style.display = 'none';
        detailPlaceholder.style.display = 'flex';
        arrowLeft.classList.remove('visible');
        arrowRight.classList.remove('visible');
      }

      isDetailPage = true;
      pageMain.classList.remove('active');
      pageDetail.classList.add('active');
      detailBack.classList.add('visible');
      window.scrollTo({ top: 0 });
    }

    function transitionToDetail(index) {
      if (isTransitioning) return;
      isTransitioning = true;

      // Fade out other products, zoom in selected
      productArray.forEach(function(p, i) {
        if (i === index) {
          p.classList.add('zoom-in');
        } else {
          p.classList.add('fade-out');
        }
      });
      footer.classList.add('fade-out');

      // Wait for animation then show detail
      setTimeout(function() {
        showDetail(index);
        isTransitioning = false;
      }, 300);
    }

    products.forEach(function(product, index) {
      product.addEventListener('click', function() {
        transitionToDetail(index);
      });
    });

    // Scroll wheel navigation
    window.addEventListener('wheel', function(e) {
      if (!isDetailPage || scrollCooldown || pageCheckout.classList.contains('active')) return;

      scrollCooldown = true;
      setTimeout(function() { scrollCooldown = false; }, 400);

      if (e.deltaY > 0) {
        // Scroll down - next product
        var nextIndex = (currentProductIndex + 1) % productArray.length;
        showDetail(nextIndex);
      } else {
        // Scroll up - previous product
        var prevIndex = (currentProductIndex - 1 + productArray.length) % productArray.length;
        showDetail(prevIndex);
      }
    });

    detailBack.addEventListener('click', showMain);
    navMerch.addEventListener('click', function(e) {
      e.preventDefault();
      showMain();
    });

    cartIcon.addEventListener('click', showCheckout);
    checkoutBack.addEventListener('click', showMain);

    // Payment section visibility
    var checkoutForm = document.getElementById('checkout-form');
    var checkoutPayment = document.getElementById('checkout-payment');
    var contactInputs = checkoutForm.querySelectorAll('.checkout-input:not(#card-number):not(#card-expiry):not(#card-cvc)');

    function checkContactComplete() {
      var allFilled = true;
      contactInputs.forEach(function(input) {
        if (input.required && !input.value.trim()) {
          allFilled = false;
        }
      });
      if (allFilled) {
        checkoutPayment.classList.add('visible');
      }
    }

    contactInputs.forEach(function(input) {
      input.addEventListener('input', checkContactComplete);
    });

    arrowLeft.addEventListener('click', function() {
      if (currentImages.length > 1) {
        var prevIndex = (currentImageIndex - 1 + currentImages.length) % currentImages.length;
        updateImage(prevIndex);
      }
    });

    arrowRight.addEventListener('click', function() {
      if (currentImages.length > 1) {
        var nextIndex = (currentImageIndex + 1) % currentImages.length;
        updateImage(nextIndex);
      }
    });

    // Touch/swipe support
    var touchStartX = 0;
    var touchStartY = 0;
    var touchEndX = 0;
    var touchEndY = 0;

    pageDetail.addEventListener('touchstart', function(e) {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }, { passive: true });

    pageDetail.addEventListener('touchend', function(e) {
      touchEndX = e.changedTouches[0].screenX;
      touchEndY = e.changedTouches[0].screenY;
      handleSwipe();
    }, { passive: true });

    function handleSwipe() {
      var diffX = touchEndX - touchStartX;
      var diffY = touchEndY - touchStartY;
      var minSwipe = 50;

      // Determine if horizontal or vertical swipe
      if (Math.abs(diffX) > Math.abs(diffY)) {
        // Horizontal swipe - navigate images
        if (Math.abs(diffX) > minSwipe && currentImages.length > 1) {
          if (diffX > 0) {
            // Swipe right - previous image
            var prevIndex = (currentImageIndex - 1 + currentImages.length) % currentImages.length;
            updateImage(prevIndex);
          } else {
            // Swipe left - next image
            var nextIndex = (currentImageIndex + 1) % currentImages.length;
            updateImage(nextIndex);
          }
        }
      } else {
        // Vertical swipe - navigate products
        if (Math.abs(diffY) > minSwipe) {
          if (diffY > 0) {
            // Swipe down - previous product
            var prevProduct = (currentProductIndex - 1 + productArray.length) % productArray.length;
            showDetail(prevProduct);
          } else {
            // Swipe up - next product
            var nextProduct = (currentProductIndex + 1) % productArray.length;
            showDetail(nextProduct);
          }
        }
      }
    }
  });
</script>

</body>
</html>
