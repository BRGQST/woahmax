<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOAHMAX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #e8e0d5;
    --stone: #c9bfb0;
    --earth: #8b7355;
    --moss: #6b6b5a;
    --dark: #2c2c28;
    --cream: #f5f2ed;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Orbitron', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
    cursor: default;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    justify-content: center;
    gap: 4rem;
    padding: 2rem;
    background: var(--cream);
  }

  nav a {
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--dark);
    text-decoration: none;
    transition: color 0.2s;
  }

  nav a:hover {
    color: var(--earth);
  }

  /* CART ICON */
  .cart-icon {
    position: fixed;
    top: 2rem;
    right: 2rem;
    z-index: 101;
    color: var(--dark);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    transition: color 0.2s;
  }

  .cart-icon:hover {
    color: var(--earth);
  }

  .cart-count {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  #page-detail {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--cream);
  }

  #page-detail.active {
    animation: fadeIn 0.35s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* PRODUCTS */
  .products {
    min-height: 100vh;
    padding: 8rem 2rem 6rem;
    background: var(--cream);
  }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 3rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .product {
    aspect-ratio: 3/4;
    background: transparent;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding: 2rem;
    cursor: pointer;
    transition: transform 0.5s ease, opacity 0.4s ease;
    position: relative;
    overflow: hidden;
    user-select: text;
  }

  .product:hover {
    transform: scale(1.03);
  }

  .product.fade-out {
    opacity: 0;
    transform: scale(0.95);
    pointer-events: none;
  }

  .product.zoom-in {
    transform: scale(1.15);
    pointer-events: none;
    z-index: 10;
  }

  .product-image {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    max-width: 80%;
    max-height: 60%;
    object-fit: contain;
  }

  .product-placeholder {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--stone);
  }

  .product-name {
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    color: var(--dark);
    text-align: center;
  }

  .product[data-soldout="true"] .product-name {
    text-decoration: line-through;
    color: var(--stone);
  }

  /* PRODUCT DETAIL PAGE */
  .product-detail {
    min-height: 100vh;
    padding: 8rem 2rem 4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--cream);
  }

  .detail-image {
    max-width: 400px;
    max-height: 50vh;
    object-fit: contain;
  }

  .detail-placeholder {
    width: 300px;
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--stone);
  }

  .detail-image-container {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .detail-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.5rem;
    color: var(--dark);
    cursor: pointer;
    transition: opacity 0.2s;
    padding: 1rem;
    user-select: none;
    display: none;
  }

  .detail-arrow:hover {
    opacity: 0.6;
  }

  .detail-arrow.visible {
    display: block;
  }

  .detail-arrow-left {
    left: -7rem;
  }

  .detail-arrow-right {
    right: -7rem;
  }

  .detail-dots {
    display: flex;
    gap: 0.5rem;
    margin-top: 1.5rem;
  }

  .detail-dot {
    width: 6px;
    height: 6px;
    border-radius: 2px;
    background: var(--stone);
    cursor: pointer;
    transition: background 0.2s;
  }

  .detail-dot.active {
    background: var(--dark);
  }

  .detail-name {
    font-size: 1.3rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--dark);
    margin-top: 2rem;
    text-align: center;
  }

  .detail-price {
    font-size: 1rem;
    font-weight: 400;
    color: var(--earth);
    margin-top: 0.75rem;
  }

  .detail-soldout {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--earth);
    margin-top: 1rem;
    display: none;
  }

  .detail-soldout.visible {
    display: block;
  }

  .detail-sizes {
    display: none;
    gap: 1rem;
    margin-top: 1.25rem;
  }

  .detail-sizes.visible {
    display: flex;
  }

  .detail-size {
    padding: 0.25rem;
    border: none;
    background: transparent;
    color: var(--dark);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: color 0.2s;
  }

  .detail-size:hover {
    color: var(--earth);
  }

  .detail-size.sold-out {
    text-decoration: line-through;
    color: var(--stone);
    cursor: default;
  }

  .detail-size.sold-out:hover {
    color: var(--stone);
  }

  .adding-toast {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--earth);
    margin-top: 1rem;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .adding-toast.visible {
    opacity: 1;
  }

  .detail-back {
    position: fixed;
    top: 2rem;
    left: 2rem;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dark);
    text-decoration: none;
    cursor: pointer;
    transition: color 0.2s, opacity 0.2s;
    z-index: 102;
    opacity: 0;
    pointer-events: none;
  }

  .detail-back.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .detail-back:hover {
    color: var(--earth);
  }

  /* ABOUT */
  .about {
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 6rem 2rem;
    text-align: center;
    background: var(--cream);
  }

  .about-name {
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--dark);
    margin-bottom: 1.5rem;
  }

  .about-text {
    font-size: 1rem;
    font-weight: 400;
    line-height: 2;
    color: var(--moss);
    max-width: 500px;
  }

  /* FOOTER */
  footer {
    padding: 1.5rem 2rem;
    background: var(--cream);
    transition: opacity 0.4s ease;
  }

  footer.fade-out {
    opacity: 0;
  }

  .copyright {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--stone);
  }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    nav { gap: 3rem; padding: 1.5rem; }
    .products { padding: 6rem 1.5rem 4rem; }
    .products-grid { gap: 2rem; }
    .detail-back { left: 1.5rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="#" id="nav-merch">Merch</a>
  <a href="#">Videos</a>
</nav>

<div class="cart-icon" id="cart-icon">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M6 6h15l-1.5 9h-12z"/>
    <circle cx="9" cy="20" r="1.5"/>
    <circle cx="18" cy="20" r="1.5"/>
    <path d="M6 6L5 3H2"/>
  </svg>
  <span class="cart-count" id="cart-count">0</span>
</div>

<!-- MAIN PAGE -->
<div id="page-main" class="page active">
  <section class="products">
    <div class="products-grid">
      <div class="product" data-name="KOMTEE03" data-price="$45" data-sizes="S,M,L:out,XL" data-images="images/KOMTEE03-1.png,images/KOMTEE03-2.png">
        <img class="product-image" src="images/KOMTEE03-1.png" alt="KOMTEE03">
        <h3 class="product-name">KOMTEE03</h3>
      </div>
      <div class="product" data-name="KOMHAT03" data-price="$35" data-sizes="OS" data-images="https://images.squarespace-cdn.com/content/v1/672e42f5580783678bbe62e4/e4d393e2-e9d3-4879-bb31-5073af3db34c/KOM_HAT003_FRONT+copy.png?format=1500w">
        <img class="product-image" src="https://images.squarespace-cdn.com/content/v1/672e42f5580783678bbe62e4/e4d393e2-e9d3-4879-bb31-5073af3db34c/KOM_HAT003_FRONT+copy.png?format=1500w" alt="KOMHAT03">
        <h3 class="product-name">KOMHAT03</h3>
      </div>
      <div class="product" data-name="KOMTEE02" data-price="$45" data-images="https://images.squarespace-cdn.com/content/v1/672e42f5580783678bbe62e4/197a91a4-9833-465e-8a37-6a6e6a2848e5/KOM_TEE002_FRONT.png?format=750w,https://images.squarespace-cdn.com/content/v1/672e42f5580783678bbe62e4/885c61b8-d01d-4d76-bcc5-89e1ec003682/KOM_TEE002_BACK.png?format=750w,images/KOMTEE02-3.png" data-soldout="true">
        <img class="product-image" src="https://images.squarespace-cdn.com/content/v1/672e42f5580783678bbe62e4/197a91a4-9833-465e-8a37-6a6e6a2848e5/KOM_TEE002_FRONT.png?format=750w" alt="KOMTEE02">
        <h3 class="product-name">KOMTEE02</h3>
      </div>
    </div>
  </section>

  <footer>
    <p class="copyright">&copy; 2026 WOAHMAX</p>
  </footer>
</div>

<span class="detail-back" id="detail-back">&lt; Back</span>

<!-- PRODUCT DETAIL PAGE -->
<div id="page-detail" class="page">
  <div class="product-detail">
    <div class="detail-image-container">
      <span class="detail-arrow detail-arrow-left" id="arrow-left">&lt;</span>
      <img class="detail-image" id="detail-image" src="" alt="">
      <div class="detail-placeholder" id="detail-placeholder">Image</div>
      <span class="detail-arrow detail-arrow-right" id="arrow-right">&gt;</span>
    </div>
    <div class="detail-dots" id="detail-dots"></div>
    <h2 class="detail-name" id="detail-name"></h2>
    <p class="detail-price" id="detail-price"></p>
    <span class="detail-soldout" id="detail-soldout">Sold Out</span>
    <div class="detail-sizes" id="detail-sizes"></div>
    <span class="adding-toast" id="adding-toast">Added to cart</span>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var products = document.querySelectorAll('.product');
    var productArray = Array.from(products);
    var currentProductIndex = 0;
    var pageMain = document.getElementById('page-main');
    var pageDetail = document.getElementById('page-detail');
    var detailImage = document.getElementById('detail-image');
    var detailPlaceholder = document.getElementById('detail-placeholder');
    var detailDots = document.getElementById('detail-dots');
    var detailName = document.getElementById('detail-name');
    var detailPrice = document.getElementById('detail-price');
    var detailSoldout = document.getElementById('detail-soldout');
    var detailSizes = document.getElementById('detail-sizes');
    var detailBack = document.getElementById('detail-back');
    var arrowLeft = document.getElementById('arrow-left');
    var arrowRight = document.getElementById('arrow-right');
    var navMerch = document.getElementById('nav-merch');
    var isDetailPage = false;
    var scrollCooldown = false;
    var currentImages = [];
    var currentImageIndex = 0;
    var footer = document.querySelector('footer');
    var isTransitioning = false;
    var cartCount = document.getElementById('cart-count');
    var addingToast = document.getElementById('adding-toast');
    var cart = [];
    var toastTimeout;

    function addToCart(name, size, price) {
      cart.push({ name: name, size: size, price: price });
      cartCount.textContent = cart.length;

      // Show toast
      clearTimeout(toastTimeout);
      addingToast.textContent = name + ' ' + size + ' added';
      addingToast.classList.add('visible');
      toastTimeout = setTimeout(function() {
        addingToast.classList.remove('visible');
      }, 1500);
    }

    function updateImage(index) {
      currentImageIndex = index;
      detailImage.src = currentImages[index];
      document.querySelectorAll('.detail-dot').forEach(function(d, i) {
        d.classList.toggle('active', i === index);
      });
    }

    function showMain() {
      isDetailPage = false;
      // Reset all transition classes
      productArray.forEach(function(p) {
        p.classList.remove('fade-out', 'zoom-in');
      });
      footer.classList.remove('fade-out');
      detailBack.classList.remove('visible');
      pageMain.classList.add('active');
      pageDetail.classList.remove('active');
      window.scrollTo({ top: 0 });
    }

    function showDetail(index) {
      currentProductIndex = index;
      var product = productArray[index];
      var name = product.getAttribute('data-name');
      var price = product.getAttribute('data-price');
      var images = product.getAttribute('data-images');
      var soldout = product.getAttribute('data-soldout') === 'true';

      detailName.textContent = name;
      detailPrice.textContent = price;
      detailSoldout.classList.toggle('visible', soldout);

      // Build size buttons
      var sizes = product.getAttribute('data-sizes');
      detailSizes.innerHTML = '';
      if (!soldout && sizes) {
        sizes.split(',').forEach(function(sizeData) {
          var parts = sizeData.split(':');
          var size = parts[0];
          var isSizeOut = parts[1] === 'out';
          var btn = document.createElement('button');
          btn.className = 'detail-size' + (isSizeOut ? ' sold-out' : '');
          btn.textContent = size;
          if (!isSizeOut) {
            btn.addEventListener('click', function() {
              addToCart(name, size, price);
            });
          }
          detailSizes.appendChild(btn);
        });
        detailSizes.classList.add('visible');
      } else {
        detailSizes.classList.remove('visible');
      }

      currentImages = images ? images.split(',').filter(function(i) { return i !== ''; }) : [];
      currentImageIndex = 0;
      detailDots.innerHTML = '';

      if (currentImages.length > 0) {
        detailImage.src = currentImages[0];
        detailImage.alt = name;
        detailImage.style.display = 'block';
        detailPlaceholder.style.display = 'none';

        // Show arrows if multiple images
        if (currentImages.length > 1) {
          arrowLeft.classList.add('visible');
          arrowRight.classList.add('visible');
        } else {
          arrowLeft.classList.remove('visible');
          arrowRight.classList.remove('visible');
        }

        currentImages.forEach(function(img, idx) {
          var dot = document.createElement('span');
          dot.className = 'detail-dot' + (idx === 0 ? ' active' : '');
          dot.addEventListener('click', function() {
            updateImage(idx);
          });
          detailDots.appendChild(dot);
        });
      } else {
        detailImage.style.display = 'none';
        detailPlaceholder.style.display = 'flex';
        arrowLeft.classList.remove('visible');
        arrowRight.classList.remove('visible');
      }

      isDetailPage = true;
      pageMain.classList.remove('active');
      pageDetail.classList.add('active');
      detailBack.classList.add('visible');
      window.scrollTo({ top: 0 });
    }

    function transitionToDetail(index) {
      if (isTransitioning) return;
      isTransitioning = true;

      // Fade out other products, zoom in selected
      productArray.forEach(function(p, i) {
        if (i === index) {
          p.classList.add('zoom-in');
        } else {
          p.classList.add('fade-out');
        }
      });
      footer.classList.add('fade-out');

      // Wait for animation then show detail
      setTimeout(function() {
        showDetail(index);
        isTransitioning = false;
      }, 300);
    }

    products.forEach(function(product, index) {
      product.addEventListener('click', function() {
        transitionToDetail(index);
      });
    });

    // Scroll wheel navigation
    window.addEventListener('wheel', function(e) {
      if (!isDetailPage || scrollCooldown) return;

      scrollCooldown = true;
      setTimeout(function() { scrollCooldown = false; }, 400);

      if (e.deltaY > 0) {
        // Scroll down - next product
        var nextIndex = (currentProductIndex + 1) % productArray.length;
        showDetail(nextIndex);
      } else {
        // Scroll up - previous product
        var prevIndex = (currentProductIndex - 1 + productArray.length) % productArray.length;
        showDetail(prevIndex);
      }
    });

    detailBack.addEventListener('click', showMain);
    navMerch.addEventListener('click', function(e) {
      e.preventDefault();
      showMain();
    });

    arrowLeft.addEventListener('click', function() {
      if (currentImages.length > 1) {
        var prevIndex = (currentImageIndex - 1 + currentImages.length) % currentImages.length;
        updateImage(prevIndex);
      }
    });

    arrowRight.addEventListener('click', function() {
      if (currentImages.length > 1) {
        var nextIndex = (currentImageIndex + 1) % currentImages.length;
        updateImage(nextIndex);
      }
    });
  });
</script>

</body>
</html>
